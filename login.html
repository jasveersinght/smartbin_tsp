<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Smart Waste Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-green-500 to-green-600 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <div class="bg-green-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </div>
                <h1 class="text-3xl font-bold text-gray-800">Admin Login</h1>
                <p class="text-gray-600 mt-2">Smart Waste Management System</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                    <input type="text" id="username" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition"
                           placeholder="Enter username">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition"
                           placeholder="Enter password">
                </div>

                <button type="submit"
                        class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition shadow-lg">
                    Login
                </button>
            </form>

            <div id="errorMessage" class="hidden mt-4 p-3 bg-red-50 border-l-4 border-red-500 rounded">
                <p class="text-red-700 text-sm font-semibold">Invalid credentials. Please try again.</p>
            </div>

            <div class="mt-6 text-center">
                <a href="index.html" class="text-green-600 hover:text-green-700 font-semibold text-sm">
                    ← Back to Map View
                </a>
            </div>

            <div class="mt-6 p-4 bg-gray-50 rounded-lg">
                <p class="text-xs text-gray-600 text-center">
                    <strong>Demo Credentials:</strong><br>
                    Username: admin | Password: admin123
                </p>
            </div>
        </div>

        <!-- Admin Panel (Hidden until login) -->
        <div id="adminPanel" class="hidden bg-white rounded-2xl shadow-2xl p-8 mt-6">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Admin Panel</h2>
                <button onclick="logout()" class="px-4 py-2 bg-red-500 text-white rounded-lg font-semibold hover:bg-red-600 transition">
                    Logout
                </button>
            </div>

            <!-- Add New Bin Form -->
            <div class="mb-6">
                <h3 class="text-lg font-bold text-gray-800 mb-4">Add New Bin</h3>
                <form id="addBinForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Latitude</label>
                            <input type="number" step="0.000001" id="binLat" required
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none"
                                   placeholder="12.9716">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Longitude</label>
                            <input type="number" step="0.000001" id="binLng" required
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none"
                                   placeholder="77.5946">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Area Name</label>
                        <input type="text" id="binArea" required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none"
                               placeholder="e.g., Downtown Center">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Fill Level (%)</label>
                        <input type="number" min="0" max="100" id="binFill" required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none"
                               placeholder="0">
                    </div>

                    <button type="submit"
                            class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition">
                        Add Bin
                    </button>
                </form>
            </div>

            <!-- Update Bin Fill Level -->
            <div>
                <h3 class="text-lg font-bold text-gray-800 mb-4">Update Bin Fill Level</h3>
                <form id="updateBinForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Bin ID</label>
                        <input type="number" id="updateBinId" required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none"
                               placeholder="Enter bin ID">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">New Fill Level (%)</label>
                        <input type="number" min="0" max="100" id="updateFillLevel" required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none"
                               placeholder="0-100">
                    </div>

                    <button type="submit"
                            class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
                        Update Fill Level
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000';

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Simple local validation
            if (username === 'admin' && password === 'admin123') {
                document.getElementById('errorMessage').classList.add('hidden');
                document.querySelector('.bg-white.rounded-2xl.shadow-2xl.p-8').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
            } else {
                document.getElementById('errorMessage').classList.remove('hidden');
            }
        });

        // Logout function
        function logout() {
            document.getElementById('adminPanel').classList.add('hidden');
            document.querySelector('.bg-white.rounded-2xl.shadow-2xl.p-8').classList.remove('hidden');
            document.getElementById('loginForm').reset();
            document.getElementById('errorMessage').classList.add('hidden');
        }

        // Add bin form handler
        document.getElementById('addBinForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const binData = {
                location_lat: parseFloat(document.getElementById('binLat').value),
                location_lng: parseFloat(document.getElementById('binLng').value),
                area: document.getElementById('binArea').value,
                fill_level: parseInt(document.getElementById('binFill').value)
            };

            try {
                const response = await fetch(`${API_URL}/api/bins`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(binData)
                });

                if (response.ok) {
                    alert('Bin added successfully!');
                    document.getElementById('addBinForm').reset();
                } else {
                    alert('Failed to add bin. Please try again.');
                }
            } catch (error) {
                console.error('Error adding bin:', error);
                alert('Error connecting to server. Make sure the backend is running.');
            }
        });

        // Update bin form handler
        document.getElementById('updateBinForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const binId = document.getElementById('updateBinId').value;
            const fillLevel = parseInt(document.getElementById('updateFillLevel').value);

            try {
                const response = await fetch(`${API_URL}/api/bins/${binId}/fill`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ fill_level: fillLevel })
                });

                if (response.ok) {
                    alert('Bin fill level updated successfully!');
                    document.getElementById('updateBinForm').reset();
                } else {
                    alert('Failed to update bin. Please check the bin ID.');
                }
            } catch (error) {
                console.error('Error updating bin:', error);
                alert('Error connecting to server. Make sure the backend is running.');
            }
        });
    </script>
</body>
</html>
